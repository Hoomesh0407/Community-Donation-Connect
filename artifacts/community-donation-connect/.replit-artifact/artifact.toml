kind = "web"
previewPath = "/"
title = "Community Donation Connect"
version = "1.0.0"
id = "artifacts/community-donation-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26234

[services.development]
run = "pnpm --filter @workspace/community-donation-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/community-donation-connect", "run", "build" ]
publicDir = "artifacts/community-donation-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26234"
BASE_PATH = "/"
